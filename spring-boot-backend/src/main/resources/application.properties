# =============================================
# Common Configuration
# =============================================
spring.application.name=healthcare-appointment-system

# Active profile (override via env: SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

# JWT Configuration
app.jwt.secret=${JWT_SECRET:myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads
app.file.medical-records-dir=./medical-records

# CORS
app.cors.allowed-origins=http://localhost:5173,https://healthcare-appointment-system-elhd.vercel.app
# Server
server.port=${PORT:8080}

server.address=0.0.0.0